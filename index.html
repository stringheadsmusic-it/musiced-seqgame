<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Garden Sequencer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="dark-mode">
    <div class="container">
        <header>
            <h1>Music Garden</h1>
            <div class="controls">
                <div class="bpm-control">
                    <span>BPM</span>
                    <input type="range" id="bpm-slider" min="60" max="240" step="1" value="120">
                    <input type="number" id="bpm" value="120" min="60" max="240">
                </div>
                <button id="play-btn" class="btn">Start</button>
            </div>
        </header>

        <main>
            <div id="sequencer-grid" class="grid-container">
                <!-- Grid pads will be generated by JS -->
            </div>
        </main>

        <footer class="game-footer">
            <div class="basket-container" data-lane="0">
                <div class="seed" draggable="true" data-lane="0">
                    <img src="assets/image/tomato_seed.png" class="seed-img" alt="Tomato Seed">
                </div>
                <div class="inventory-info">
                    <span class="seed-count" id="count-0">4</span>
                    <span class="lane-label-game">Tomatoes</span>
                </div>
            </div>

            <div class="basket-container" data-lane="1">
                <div class="seed" draggable="true" data-lane="1">
                    <img src="assets/image/corn_seed.png" class="seed-img" alt="Corn Seed">
                </div>
                <div class="inventory-info">
                    <span class="seed-count" id="count-1">8</span>
                    <span class="lane-label-game">Corn</span>
                </div>
            </div>

            <div class="basket-container" data-lane="2">
                <div class="seed" draggable="true" data-lane="2">
                    <img src="assets/image/carrot_seed.png" class="seed-img" alt="Carrot Seed">
                </div>
                <div class="inventory-info">
                    <span class="seed-count" id="count-2">16</span>
                    <span class="lane-label-game">Carrots</span>
                </div>
            </div>

            <div class="tool-container">
                <div id="shovel-tool" class="tool">
                    <img src="assets/image/shovel.png" class="shovel-img" alt="Shovel">
                </div>
                <span class="lane-label-game">Harvest</span>
            </div>
        </footer>
    </div>

    <script src="audio.js" type="module"></script>
    <script src="sequencer.js" type="module"></script>
    <script src="ui.js" type="module"></script>
</body>

</html>
