<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3-Lane Drum Sequencer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">
    <div class="container">
        <header>
            <h1>Drum Sequencer</h1>
            <div class="controls">
                <button id="play-btn" class="btn">Play</button>
                <div class="bpm-control">
                    <label for="bpm">BPM:</label>
                    <input type="number" id="bpm" value="120" min="40" max="220">
                </div>
            </div>
        </header>
        
        <main>
            <div id="sequencer-grid" class="grid-container">
                <!-- Grid pads will be generated by JS -->
            </div>
        </main>
        
        <footer>
            <p>1-Bar / 4-Step Sequencer</p>
        </footer>
    </div>
    
    <script src="audio.js" type="module"></script>
    <script src="sequencer.js" type="module"></script>
    <script src="ui.js" type="module"></script>
</body>
</html>
